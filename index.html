<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RCS Marine Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- SFONDO ANIMATO -->
  <div class="bg">
    <div class="bg-overlay"></div>
    <canvas id="waves"></canvas>
    <div class="ship" id="ship"></div>
  </div>

  <!-- LOGO -->
  <header>
    <div class="logo">
      <span class="logo-icon">⚓</span>
      <div>
        <div class="logo-rcs">RCS</div>
        <div class="logo-sub">MARINE INTELLIGENCE</div>
      </div>
    </div>
  </header>

  <!-- LOGIN -->
  <main>
    <div class="card" id="card">
      <div class="card-line"></div>
      <div class="card-body">
        <h1>ACCESSO RISERVATO</h1>
        <p class="card-desc">Ricambi Centro Sud S.r.l. · Catania</p>

        <div class="field">
          <label>UTENTE</label>
          <input type="text" id="u" placeholder="nome utente">
        </div>
        <div class="field">
          <label>PASSWORD</label>
          <input type="password" id="p" placeholder="••••••••">
        </div>

        <div class="error" id="err">Credenziali non corrette.</div>

        <button id="btn" onclick="login()">
          <span id="btnTxt">ACCEDI</span>
          <span class="arrow">→</span>
        </button>

        <div class="divider"></div>

        <!-- ACCESSO RAPIDO CON PASTE -->
        <details style="margin-top: 20px;">
          <summary style="color: #00d4ff; cursor: pointer; font-weight: 600; font-size: 12px; letter-spacing: 1px;">⚡ ACCESSO RAPIDO (INCOLLA CREDENZIALI)</summary>
          <div style="margin-top: 12px; background: rgba(0,212,255,.08); padding: 12px; border-radius: 4px; border: 1px solid rgba(0,212,255,.2);">
            <p style="color: var(--grigio); font-size: 12px; margin-bottom: 10px;">Incolla nel formato: <strong style="color: #00d4ff;">utente:password</strong></p>
            <input type="text" id="quickPaste" placeholder="utente:password" style="width: 100%; padding: 10px; background: rgba(0,0,0,.3); border: 1px solid rgba(0,87,184,.3); border-radius: 4px; color: #fff; font-family: monospace; font-size: 12px; box-sizing: border-box;" onpaste="handleQuickPaste(event)">
            <button onclick="parseAndLogin()" style="width: 100%; margin-top: 10px; padding: 10px; background: rgba(0,230,118,.2); border: 1px solid rgba(0,230,118,.4); color: #00e676; cursor: pointer; border-radius: 4px; font-weight: 600; font-size: 12px;">ACCEDI RAPIDO</button>
          </div>
        </details>

        <a href="pages/clienti.html" class="client-link">Area Clienti →</a>
      </div>
    </div>
  </main>

  <footer>© 2026 Ricambi Centro Sud S.r.l. · P.IVA IT03176280877 · Catania</footer>

  <script src="js/app.js"></script>
</body>
</html>
